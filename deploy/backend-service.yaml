# Cloud Run service definition – AI PDF Bot BACKEND
# Usage: gcloud run services replace deploy/backend-service.yaml --region=REGION
#
# Replace every PLACEHOLDER_ value before applying.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ai-pdf-bot-backend
  labels:
    cloud.googleapis.com/location: PLACEHOLDER_REGION   # e.g. us-central1
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        # Cloud SQL Auth Proxy (unix socket)
        run.googleapis.com/cloudsql-instances: PLACEHOLDER_PROJECT:PLACEHOLDER_REGION:ai-pdf-bot-db
        # Gen2 execution environment required for GCS FUSE volume mounts
        run.googleapis.com/execution-environment: gen2
        # Startup CPU boost helps for heavy ML model init
        run.googleapis.com/startup-cpu-boost: "true"
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      serviceAccountName: ai-pdf-bot-sa@PLACEHOLDER_PROJECT.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 300

      # GCS FUSE volume: mounts the data bucket as a local filesystem path
      # The app writes uploads + FAISS indexes here – persisted across restarts
      volumes:
        - name: data-volume
          csi:
            driver: gcsfuse.run.googleapis.com
            volumeAttributes:
              bucketName: PLACEHOLDER_DATA_BUCKET   # e.g. my-project-ai-pdf-bot-data

      containers:
        - image: PLACEHOLDER_REGION-docker.pkg.dev/PLACEHOLDER_PROJECT/ai-pdf-bot/backend:latest
          ports:
            - containerPort: 8080

          resources:
            limits:
              cpu: "2"
              memory: 2Gi

          volumeMounts:
            - name: data-volume
              mountPath: /app/data

          env:
            - name: ENVIRONMENT
              value: gcp
            - name: PORT
              value: "8080"

            # Cloud SQL socket connection (built from this in config.py)
            - name: CLOUD_SQL_CONNECTION_NAME
              value: PLACEHOLDER_PROJECT:PLACEHOLDER_REGION:ai-pdf-bot-db

            - name: DB_NAME
              value: ai_pdf_bot

            # Email sender identity
            - name: RESEND_FROM_EMAIL
              value: aidocchat@hireplz.live

            # Replace with actual frontend Cloud Run URL after frontend is deployed
            - name: ALLOWED_ORIGINS
              value: https://PLACEHOLDER_FRONTEND_URL

            - name: FRONTEND_URL
              value: https://PLACEHOLDER_FRONTEND_URL

            # ── Secrets from Secret Manager ────────────────────────────────
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: DB_USER
                  key: latest

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: DB_PASSWORD
                  key: latest

            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: JWT_SECRET_KEY
                  key: latest

            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GROQ_API_KEY
                  key: latest

            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: RESEND_API_KEY
                  key: latest
